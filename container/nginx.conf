# RUSTER reverse proxy (unmodified nginx config; permitted component).
# nginx terminates HTTP, serves the static stylesheet, and proxies everything
# else to the dumb capability adapter. It performs no application logic.

worker_processes 1;
events { worker_connections 256; }

http {
  sendfile on;
  keepalive_timeout 15;
  client_max_body_size 1m;          # transport-level bound (matches adapter MAXBODY)
  default_type application/octet-stream;

  upstream ruster_adapter { server adapter:8080; }

  server {
    listen 80;
    server_name _;

    # static CSS served directly by nginx
    location = /static/application.css {
      alias /app/static/application.css;
      add_header Content-Type text/css;
    }

    # everything else -> dumb adapter -> Malbolge process
    location / {
      proxy_pass http://ruster_adapter;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_read_timeout 15s;
    }
  }
}
