# RUSTER — compose the dumb adapter (with the two unmodified interpreters baked
# in) behind an unmodified nginx reverse proxy.
#
#   docker compose up --build
#   curl --data-binary 'ABCD' http://127.0.0.1:8088/case   # -> ABCD (echoed by a
#                                                           #    live Malbolge process)
#
# See docs/FEASIBILITY.md for exactly what the Malbolge layer does and does not
# implement.

services:
  adapter:
    build:
      context: .
      dockerfile: container/Dockerfile
    environment:
      RUSTER_PORT: "8080"
      RUSTER_INTERP: "runtime/interpreter/unshackled"
      RUSTER_PROGRAM: "src/echo_four_bytes.mu"
      RUSTER_MODE: "body"
    expose:
      - "8080"

  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./container/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    ports:
      - "8088:80"
    depends_on:
      - adapter
